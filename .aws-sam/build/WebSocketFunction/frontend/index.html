<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitCoach</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; text-align: center; background: #1a1a2e; color: #eee; padding: 20px; }
        h1 { margin-bottom: 10px; }
        #count { font-size: 5rem; color: #0ff; line-height: 1; }
        #timer { font-size: 5rem; color: #0ff; line-height: 1; }
        #container { position: relative; display: inline-block; width: 480px; height: 360px; margin: 10px auto; background: #000; border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        #status { color: #f55; margin: 8px 0; height: 20px; }
        #status.connected { color: #0f0; }
        #feedback { font-size: 1.2rem; min-height: 30px; margin: 8px 0; color: #ff4; font-weight: bold; }
        #feedback.good { color: #0f0; }
        #feedback.bad { color: #f44; }
        button { padding: 10px 20px; font-size: 1.1rem; border: none; border-radius: 6px; cursor: pointer; background: #0ff; color: #000; margin: 5px; }
        button:disabled { opacity: 0.5; }
        .exercise-btn { background: #333; color: #eee; border: 2px solid #555; }
        .exercise-btn.active { border-color: #0ff; background: #1a3a4a; color: #0ff; }
        #exercises { margin: 10px 0; }
        #retry-btn { background: #f80; display: none; }
        #angles { font-size: 0.85rem; color: #888; height: 20px; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>FitCoach</h1>
    <div id="exercises">
        <button class="exercise-btn active" data-ex="pushups">🫸 Pushups</button>
        <button class="exercise-btn" data-ex="squats">🦵 Squats</button>
        <button class="exercise-btn" data-ex="plank">🧘 Plank</button>
    </div>
    <div>
        <button id="startBtn">Start</button>
        <button id="stopBtn" disabled>Stop</button>
        <button id="retry-btn">🔄 Retry</button>
    </div>
    <div id="status">Disconnected</div>
    <div id="count">0</div>
    <div id="timer" style="display:none">0:00</div>
    <div id="feedback"></div>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>
    <div id="angles"></div>

    <script type="module">
        import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs";

        const WS_URL = "wss://4r8ozlpr6c.execute-api.us-west-2.amazonaws.com/prod";

        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        const countEl = document.getElementById('count');
        const timerEl = document.getElementById('timer');
        const statusEl = document.getElementById('status');
        const anglesEl = document.getElementById('angles');
        const feedbackEl = document.getElementById('feedback');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const retryBtn = document.getElementById('retry-btn');

        let ws = null, streaming = false, poseLandmarker = null, animFrame = null;
        let count = 0, enBas = false;
        let exercise = 'pushups';
        let plankStart = null, plankElapsed = 0, plankStopped = false;

        // Exercise selector
        document.querySelectorAll('.exercise-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.exercise-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                exercise = btn.dataset.ex;
                resetState();
            };
        });

        retryBtn.onclick = () => {
            plankStopped = false;
            plankStart = null;
            plankElapsed = 0;
            timerEl.textContent = '0:00';
            retryBtn.style.display = 'none';
            feedbackEl.textContent = '';
            feedbackEl.className = '';
        };

        function resetState() {
            count = 0; enBas = false;
            plankStart = null; plankElapsed = 0; plankStopped = false;
            countEl.textContent = '0';
            timerEl.textContent = '0:00';
            feedbackEl.textContent = '';
            feedbackEl.className = '';
            retryBtn.style.display = 'none';
            countEl.style.display = exercise === 'plank' ? 'none' : 'block';
            timerEl.style.display = exercise === 'plank' ? 'block' : 'none';
        }

        const CONNECTIONS = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[24,26],[25,27],[26,28],[27,29],[28,30],[29,31],[30,32]];

        async function initPose() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task" },
                runningMode: "VIDEO", numPoses: 1
            });
        }

        function drawSkeleton(landmarks) {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 3;
            for (const [i, j] of CONNECTIONS) {
                const a = landmarks[i], b = landmarks[j];
                if (a.visibility > 0.5 && b.visibility > 0.5) {
                    ctx.beginPath();
                    ctx.moveTo(a.x * overlay.width, a.y * overlay.height);
                    ctx.lineTo(b.x * overlay.width, b.y * overlay.height);
                    ctx.stroke();
                }
            }
            ctx.fillStyle = '#ff0044';
            for (const lm of landmarks) {
                if (lm.visibility > 0.5) {
                    ctx.beginPath();
                    ctx.arc(lm.x * overlay.width, lm.y * overlay.height, 4, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }
        }

        // --- PUSHUPS ---
        function handlePushups(angles) {
            const hip = angles.HancheDroite ?? angles.HancheGauche;
            if (hip == null) return setFeedback("Can't see your full body", 'bad');
            if (hip < 160) return setFeedback(`Straighten your body! (hip: ${hip.toFixed(0)}°)`, 'bad');
            const elbow = angles.CoudeDroit ?? angles.CoudeGauche;
            if (elbow == null) return setFeedback("Can't see your elbows", 'bad');
            setFeedback('Good form ✓', 'good');
            if (elbow <= 110) enBas = true;
            else if (enBas && elbow >= 140) { enBas = false; count++; countEl.textContent = count; }
        }

        // --- SQUATS ---
        function handleSquats(angles) {
            const hip = angles.HancheDroite ?? angles.HancheGauche;
            const knee = angles.GenouDroit ?? angles.GenouGauche;
            if (knee == null || hip == null) return setFeedback("Stand sideways so I can see your full body", 'bad');
            // Posture check: back straight (hip > 140)
            if (hip < 140) return setFeedback(`Keep your back straighter! (hip: ${hip.toFixed(0)}°)`, 'bad');
            setFeedback('Good form ✓', 'good');
            // Count: knee bends below 110° (down), extends above 150° (up)
            if (knee <= 110) enBas = true;
            else if (enBas && knee >= 150) { enBas = false; count++; countEl.textContent = count; }
        }

        // --- PLANK ---
        function handlePlank(angles) {
            if (plankStopped) return;
            const hip = angles.HancheDroite ?? angles.HancheGauche;
            const shoulder = angles.EpauleDroite ?? angles.EpauleGauche;
            if (hip == null) return setFeedback("Can't see your full body", 'bad');

            let postureOk = true;
            if (hip < 155) { setFeedback(`Raise your hips! (${hip.toFixed(0)}°, need 155°+)`, 'bad'); postureOk = false; }
            else if (hip > 185) { setFeedback(`Lower your hips! (${hip.toFixed(0)}°)`, 'bad'); postureOk = false; }

            if (!postureOk) {
                // Stop chrono
                if (plankStart) {
                    plankElapsed += (Date.now() - plankStart) / 1000;
                    plankStart = null;
                }
                plankStopped = true;
                retryBtn.style.display = 'inline-block';
                setFeedback(`Posture lost! Time: ${formatTime(plankElapsed)}. Click Retry to continue.`, 'bad');
                return;
            }

            setFeedback('Hold it! ✓', 'good');
            if (!plankStart) plankStart = Date.now();
            const total = plankElapsed + (Date.now() - plankStart) / 1000;
            timerEl.textContent = formatTime(total);
        }

        function formatTime(s) {
            const mins = Math.floor(s / 60);
            const secs = Math.floor(s % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function setFeedback(msg, type) {
            feedbackEl.textContent = msg;
            feedbackEl.className = type;
        }

        function handleAngles(angles) {
            if (exercise === 'pushups') handlePushups(angles);
            else if (exercise === 'squats') handleSquats(angles);
            else if (exercise === 'plank') handlePlank(angles);
        }

        function processFrame() {
            if (!streaming) return;
            const result = poseLandmarker.detectForVideo(video, performance.now());
            if (result.landmarks && result.landmarks.length > 0) {
                const lm = result.landmarks[0].map(p => ({ x: p.x, y: p.y, z: p.z, visibility: p.visibility }));
                drawSkeleton(lm);
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ action: "sendframe", landmarks: lm }));
                }
            }
            animFrame = requestAnimationFrame(processFrame);
        }

        startBtn.onclick = async () => {
            statusEl.textContent = 'Loading model...';
            if (!poseLandmarker) await initPose();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 480, height: 360 } });
            video.srcObject = stream;
            await video.play();

            ws = new WebSocket(WS_URL);
            ws.onopen = () => {
                statusEl.textContent = 'Connected'; statusEl.className = 'connected';
                streaming = true; startBtn.disabled = true; stopBtn.disabled = false;
                resetState();
                processFrame();
            };
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.angles) {
                    handleAngles(data.angles);
                    const vals = Object.entries(data.angles).map(([k,v]) => `${k}: ${v?v.toFixed(0)+'°':'-'}`).join(' | ');
                    anglesEl.textContent = vals;
                }
            };
            ws.onclose = () => { statusEl.textContent = 'Disconnected'; statusEl.className = ''; streaming = false; };
            ws.onerror = () => { statusEl.textContent = 'Connection error'; };
        };

        stopBtn.onclick = () => {
            streaming = false;
            if (animFrame) cancelAnimationFrame(animFrame);
            if (ws) ws.close();
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            startBtn.disabled = false; stopBtn.disabled = true;
            statusEl.textContent = 'Disconnected'; statusEl.className = '';
        };
    </script>
</body>
</html>
